<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>双端队列 动态动画演示</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            .queue-item {
                transition: all 0.4s ease-out;
                transform: translateX(0);
                opacity: 1;
                scale: 1;
            }
            .item-add-front {
                transform: translateX(-50px);
                opacity: 0;
                scale: 0.8;
            }
            .item-add-back {
                transform: translateX(50px);
                opacity: 0;
                scale: 0.8;
            }
            .item-remove {
                transform: translateX(0);
                opacity: 0;
                scale: 0.5;
                margin: 0 !important;
                width: 0 !important;
                padding: 0 !important;
            }
            .log-container {
                scrollbar-width: thin;
                scrollbar-color: #3b82f6 #e5e7eb;
            }
        </style>
    </head>
    <body
        class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-5 font-sans"
    >
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-indigo-700 mb-2">
                    双端队列（Deque）动态演示
                </h1>
                <p class="text-gray-600">
                    支持两端进出，实时动画 + 数据 + 步骤日志
                </p>
            </div>

            <!-- 队列可视化区域 -->
            <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
                <h3
                    class="text-xl font-semibold text-gray-700 mb-4 flex items-center"
                >
                    <span class="mr-2">📦 队列可视化</span>
                    <span
                        class="text-sm bg-blue-100 text-blue-600 px-2 py-1 rounded"
                        >前端 ←→ 后端</span
                    >
                </h3>
                <div
                    id="queueContainer"
                    class="flex flex-wrap justify-center items-center gap-3 min-h-[120px] border-2 border-dashed border-gray-300 rounded-lg p-5 bg-gray-50"
                >
                    <div class="text-gray-400">队列为空，点击按钮操作</div>
                </div>
            </div>

            <!-- 实时数据展示 -->
            <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">
                    📊 当前队列数据
                </h3>
                <div
                    id="dataDisplay"
                    class="text-indigo-600 font-mono text-lg p-3 bg-indigo-50 rounded"
                >
                    [ ]
                </div>
            </div>

            <!-- 操作按钮 -->
            <div
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6"
            >
                <button
                    onclick="addFront()"
                    class="bg-blue-600 hover:bg-blue-70 text-white py-4 px-3 rounded-xl font-medium transition-all shadow-md hover:shadow-lg"
                >
                    🔼 前端入队
                </button>
                <button
                    onclick="removeFront()"
                    class="bg-orange-600 hover:bg-orange-70 text-white py-4 px-3 rounded-xl font-medium transition-all shadow-md hover:shadow-lg"
                >
                    🔽 前端出队
                </button>
                <button
                    onclick="addBack()"
                    class="bg-green-600 hover:bg-green-70 text-white py-4 px-3 rounded-xl font-medium transition-all shadow-md hover:shadow-lg"
                >
                    🔼 后端入队
                </button>
                <button
                    onclick="removeBack()"
                    class="bg-red-600 hover:bg-red-70 text-white py-4 px-3 rounded-xl font-medium transition-all shadow-md hover:shadow-lg"
                >
                    🔽 后端出队
                </button>
            </div>
            <button
                onclick="clearQueue()"
                class="w-full bg-gray-600 hover:bg-gray-70 text-white py-3 rounded-xl font-medium transition-all shadow-md mb-6"
            >
                🗑️ 清空队列
            </button>

            <!-- 操作日志 -->
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-lg font-semibold text-gray-700 mb-3">
                    📝 操作步骤日志
                </h3>
                <div
                    id="logContainer"
                    class="log-container h-48 overflow-y-auto p-3 bg-gray-50 rounded border border-gray-200"
                >
                    <div class="text-gray-500">等待操作...</div>
                </div>
            </div>
        </div>

        <script>
            // 初始化双端队列
            let deque = [];
            let elementId = 1;
            const queueContainer = document.getElementById("queueContainer");
            const dataDisplay = document.getElementById("dataDisplay");
            const logContainer = document.getElementById("logContainer");

            // 更新队列数据展示
            function updateData() {
                dataDisplay.textContent = JSON.stringify(deque);
            }

            // 添加操作日志
            function addLog(text) {
                if (logContainer.querySelector(".text-gray-500"))
                    logContainer.innerHTML = "";
                const log = document.createElement("div");
                log.className = "p-2 border-b border-gray-200 last:border-0";
                log.innerHTML = `<span class="text-blue-600">${new Date().toLocaleTimeString()}</span>：${text}`;
                logContainer.appendChild(log);
                logContainer.scrollTop = logContainer.scrollHeight;
            }

            // 创建队列元素
            function createQueueElement(value) {
                const item = document.createElement("div");
                item.className =
                    "queue-item bg-gradient-to-r from-indigo-500 to-purple-500 text-white w-16 h-16 rounded-lg flex items-center justify-center font-bold text-lg shadow-md";
                item.textContent = value;
                return item;
            }

            // 清空空队列提示
            function clearEmptyTip() {
                if (queueContainer.querySelector(".text-gray-400")) {
                    queueContainer.innerHTML = "";
                }
            }

            // 1. 前端入队（修复：不清空容器，直接左侧插入）
            function addFront() {
                const val = elementId++;
                deque.unshift(val);
                clearEmptyTip();

                const item = createQueueElement(val);
                item.classList.add("item-add-front");
                queueContainer.prepend(item);

                setTimeout(() => item.classList.remove("item-add-front"), 10);
                updateData();
                addLog(`前端入队：${val}，队列：${JSON.stringify(deque)}`);
            }

            // 2. 后端入队（修复：不清空容器，直接右侧插入）
            function addBack() {
                const val = elementId++;
                deque.push(val);
                clearEmptyTip();

                const item = createQueueElement(val);
                item.classList.add("item-add-back");
                queueContainer.appendChild(item);

                setTimeout(() => item.classList.remove("item-add-back"), 10);
                updateData();
                addLog(`后端入队：${val}，队列：${JSON.stringify(deque)}`);
            }

            // 3. 前端出队（修复：精准删除第一个元素）
            function removeFront() {
                if (deque.length === 0) {
                    addLog("❌ 队列已空，无法前端出队");
                    return;
                }
                const val = deque.shift();
                const firstItem = queueContainer.querySelector(".queue-item");

                firstItem.classList.add("item-remove");
                setTimeout(() => {
                    firstItem.remove();
                    if (deque.length === 0) {
                        queueContainer.innerHTML =
                            '<div class="text-gray-400">队列为空，点击按钮操作</div>';
                    }
                }, 400);

                updateData();
                addLog(`前端出队：${val}，队列：${JSON.stringify(deque)}`);
            }

            // 4. 后端出队（修复：精准删除最后一个元素）
            function removeBack() {
                if (deque.length === 0) {
                    addLog("❌ 队列已空，无法后端出队");
                    return;
                }
                const val = deque.pop();
                const items = queueContainer.querySelectorAll(".queue-item");
                const lastItem = items[items.length - 1];

                lastItem.classList.add("item-remove");
                setTimeout(() => {
                    lastItem.remove();
                    if (deque.length === 0) {
                        queueContainer.innerHTML =
                            '<div class="text-gray-400">队列为空，点击按钮操作</div>';
                    }
                }, 400);

                updateData();
                addLog(`后端出队：${val}，队列：${JSON.stringify(deque)}`);
            }

            // 清空队列（修复：完整清空）
            function clearQueue() {
                deque = [];
                elementId = 1;
                const items = queueContainer.querySelectorAll(".queue-item");
                items.forEach((item) => item.classList.add("item-remove"));

                setTimeout(() => {
                    queueContainer.innerHTML =
                        '<div class="text-gray-400">队列为空，点击按钮操作</div>';
                    updateData();
                    addLog("🗑️ 已清空队列");
                }, 400);
            }
        </script>
    </body>
</html>
